name: Supabase Keep Alive

on:
  schedule:
    # Run once daily at 08:00 South Africa time (06:00 UTC) to keep the free-tier Supabase project active.
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Update Supabase keepalive timestamp
        run: |
          touched_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          supabase_url="${SUPABASE_URL%/}"
          case "$supabase_url" in
            */rest/v1) rest_url="$supabase_url" ;;
            *) rest_url="$supabase_url/rest/v1" ;;
          esac

          response="$(curl --fail --show-error --silent --request PATCH \
            "${rest_url}/keepalive_pings?id=eq.1&select=id,touched_at" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            --data "{\"touched_at\":\"${touched_at}\"}")"

          if [ "$response" = "[]" ]; then
            echo "No keepalive_pings row with id=1 was updated."
            exit 1
          fi

          echo "Updated keepalive_pings id=1 touched_at=${touched_at}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
