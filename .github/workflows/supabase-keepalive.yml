name: Supabase Keep Alive

on:
  schedule:
    # Run once daily at 08:00 South Africa time (06:00 UTC) to keep the free-tier Supabase project active.
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Update Supabase keepalive timestamp
        run: |
          touched_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          supabase_url="${SUPABASE_URL%/}"

          curl --fail --show-error --silent --request PATCH \
            "${supabase_url}/keepalive_pings?id=eq.1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            --data "{\"touched_at\":\"${touched_at}\"}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
